<!DOCTYPE html>
<html>
<head>
<title>Neon Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: black;
  color: white;
}

/* glowing background */
body::before {
  content: "";
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: radial-gradient(circle at top, #00fff7 0%, transparent 40%),
              radial-gradient(circle at bottom, #ff00ff 0%, transparent 40%);
  opacity: 0.2;
  z-index: -1;
}

.header {
  text-align:center;
  padding:20px;
  font-size:24px;
  color:#00fff7;
  text-shadow: 0 0 10px #00fff7, 0 0 20px #00fff7;
}

.card {
  margin: 30px auto;
  width: 90%;
  max-width: 400px;
  background: rgba(20,20,20,0.8);
  border: 1px solid #00fff7;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 0 15px #00fff7;
}

.title {
  font-size: 20px;
  color: #ff00ff;
  text-shadow: 0 0 10px #ff00ff;
}

.price {
  font-size: 26px;
  margin: 10px 0;
  color: #00fff7;
  text-shadow: 0 0 10px #00fff7;
}

.btn {
  display:block;
  margin:10px 0;
  padding:12px;
  text-align:center;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.buy {
  background: #ff00ff;
  color: white;
  box-shadow: 0 0 15px #ff00ff;
}

.buy:hover {
  box-shadow: 0 0 25px #ff00ff;
  transform: scale(1.05);
}

.whatsapp {
  background: #00fff7;
  color:black;
  box-shadow: 0 0 15px #00fff7;
}

.whatsapp:hover {
  box-shadow: 0 0 25px #00fff7;
  transform: scale(1.05);
}

.footer {
  text-align:center;
  margin-top:30px;
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<div class="header">
⚡ NEON DIGITAL STORE ⚡
</div>

<div class="card">
  <div class="title">PC PANEL PREMIUM</div>
  <p>Fast setup • Secure access • Instant delivery</p>

  <div class="price">Rs 250</div>

  <a class="btn buy" href="#">BUY NOW</a>
  <a class="btn whatsapp" href="https://wa.me/923001234567">CONTACT WHATSAPP</a>
</div>

<div class="footer">
Made with Neon UI ✨
</div>

</body>
</html>
